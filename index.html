<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário Corporativo</title>
  
  <!-- Carrega o React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Carrega o Babel para traduzir o código React (JSX) no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Carrega o Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Estilos base do nosso Canvas -->
  <style>
    body { margin: 0; padding: 0; background-color: #F3F4F6; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body>
  <!-- Onde a nossa aplicação vai ser injetada -->
  <div id="root"></div>

  <!-- O nosso código de programação -->
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- ÍCONES ---
    const CalendarIcon = ({ size=24, className="", strokeWidth=2 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const MapPin = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Briefcase = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const Flag = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>;
    const Filter = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
    const ChevronRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const Clock = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const Info = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const X = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const ArrowRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const FileText = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;

    // --- DADOS SIMULADOS (Mock Data) ---
    const MOCK_HOLIDAYS = [
      { id: 1, date: '2026-01-01', name: 'Ano Novo', type: 'nacional' },
      { id: 2, date: '2026-02-17', name: 'Carnaval', type: 'nacional' },
      { id: 3, date: '2026-03-25', name: 'Data Magna do Ceará', type: 'estadual' },
      { id: 4, date: '2026-04-03', name: 'Sexta-feira Santa', type: 'nacional' },
      { id: 5, date: '2026-04-21', name: 'Tiradentes', type: 'nacional' },
      { id: 6, date: '2026-05-01', name: 'Dia do Trabalhador', type: 'nacional' },
      { id: 7, date: '2026-09-07', name: 'Independência do Brasil', type: 'nacional' },
      { id: 8, date: '2026-10-12', name: 'Nossa Sr.a Aparecida', type: 'nacional' },
      { id: 9, date: '2026-10-15', name: 'Emancipação de Caucaia', type: 'municipal' },
      { id: 10, date: '2026-11-02', name: 'Finados', type: 'nacional' },
      { id: 11, date: '2026-11-15', name: 'Proclamação da República', type: 'nacional' },
      { id: 12, date: '2026-12-08', name: 'Nossa Sr.a da Conceição (Padroeira)', type: 'municipal' },
      { id: 13, date: '2026-12-25', name: 'Natal', type: 'nacional' },
    ];

    const MOCK_HR_EVENTS = [
      { id: 101, date: '2026-04-28', name: 'Integração de Novos Colaboradores', time: '09:00 - 11:00', department: 'RH' },
      { id: 102, date: '2026-04-29', name: 'Treinamento de Compliance e Ética', time: '14:00 - 16:00', department: 'Jurídico/RH' },
      { id: 103, date: '2026-04-30', name: 'Festa dos Aniversariantes do Mês', time: '16:00 - 17:30', department: 'Endomarketing' },
      { id: 104, date: '2026-05-05', name: 'Reunião de Resultados (Q1)', time: '10:00 - 12:00', department: 'Diretoria' },
    ];

    function App() {
      // --- ESTADOS (State) ---
      const todayDate = new Date('2026-04-28T08:00:00'); 
      const [viewDate, setViewDate] = useState(todayDate); 
      const [filter, setFilter] = useState('todos'); 
      
      const [isHolidayModalOpen, setIsHolidayModalOpen] = useState(false);

      // Referências para o scroll do calendário no Mobile
      const scrollContainerRef = useRef(null);
      const todayRef = useRef(null);

      // --- LÓGICA DE NAVEGAÇÃO DO CALENDÁRIO ---
      const nextWeek = () => {
        const newDate = new Date(viewDate);
        newDate.setDate(viewDate.getDate() + 7);
        setViewDate(newDate);
      };

      const prevWeek = () => {
        const newDate = new Date(viewDate);
        newDate.setDate(viewDate.getDate() - 7);
        setViewDate(newDate);
      };

      const goToToday = () => setViewDate(todayDate);

      // --- EFEITO DE SCROLL (MOBILE) ---
      useEffect(() => {
        if (todayRef.current && scrollContainerRef.current) {
          const container = scrollContainerRef.current;
          const element = todayRef.current;
          const scrollPosition = element.offsetLeft - (container.offsetWidth / 2) + (element.offsetWidth / 2);
          container.scrollTo({ left: scrollPosition, behavior: 'smooth' });
        } else if (scrollContainerRef.current) {
          scrollContainerRef.current.scrollTo({ left: 0, behavior: 'smooth' });
        }
      }, [viewDate]); 

      // --- LÓGICA DE DATAS E PROGRESSO ---
      const isSameDay = (d1, d2) => {
        return d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
      };

      const yearProgress = useMemo(() => {
        const year = todayDate.getFullYear();
        const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        const totalDays = isLeapYear ? 366 : 365;
        const startOfYear = new Date(year, 0, 1);
        const diffTime = Math.abs(todayDate - startOfYear);
        const elapsedDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
        const totalWeeks = 52;
        const elapsedWeeks = Math.ceil(elapsedDays / 7);

        return {
          elapsedDays, totalDays, daysPercentage: ((elapsedDays / totalDays) * 100).toFixed(1),
          elapsedWeeks, totalWeeks, weeksPercentage: ((elapsedWeeks / totalWeeks) * 100).toFixed(1),
        };
      }, [todayDate]);

      const currentWeekNumber = useMemo(() => {
        const startDate = new Date(viewDate.getFullYear(), 0, 1);
        const days = Math.floor((viewDate - startDate) / (24 * 60 * 60 * 1000));
        return Math.ceil((viewDate.getDay() + 1 + days) / 7);
      }, [viewDate]);

      const currentWeekDays = useMemo(() => {
        const dayOfWeek = viewDate.getDay(); 
        const startDate = new Date(viewDate);
        startDate.setDate(viewDate.getDate() - dayOfWeek); 
        
        const days = [];
        for (let i = 0; i < 7; i++) {
          const d = new Date(startDate);
          d.setDate(startDate.getDate() + i);
          days.push(d);
        }
        return days;
      }, [viewDate]);

      // Calcula os próximos feriados de forma inteligente
      const upcomingHolidaysList = useMemo(() => {
        return MOCK_HOLIDAYS
          .map(h => ({ ...h, exactDate: new Date(h.date + 'T12:00:00') }))
          .filter(h => h.exactDate >= todayDate || isSameDay(h.exactDate, todayDate))
          .sort((a, b) => a.exactDate - b.exactDate)
          .slice(0, 2)
          .map(h => h.id);
      }, [todayDate]);

      const filteredHolidays = useMemo(() => {
        if (filter === 'todos') return MOCK_HOLIDAYS;
        return MOCK_HOLIDAYS.filter(h => h.type === filter);
      }, [filter]);

      // --- COMPONENTES AUXILIARES ---
      const Modal = ({ isOpen, onClose, title, children, icon: Icon, colorClass }) => {
        if (!isOpen) return null;
        
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
            <div className="relative w-full max-w-2xl bg-white rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
              <div className="flex items-center justify-between p-6 border-b border-slate-100">
                <div className="flex items-center gap-3">
                  <div className={`p-2 rounded-lg text-white ${colorClass}`}><Icon size={24} /></div>
                  <h3 className="text-xl md:text-2xl font-bold text-slate-800">{title}</h3>
                </div>
                <button onClick={onClose} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors border border-slate-200">
                  <X size={20} />
                </button>
              </div>
              <div className="p-6 overflow-y-auto flex-1 hide-scrollbar bg-slate-50/50 rounded-b-xl">
                {children}
              </div>
            </div>
          </div>
        );
      };

      const FilterButton = ({ id, label, icon: Icon, activeColor }) => {
        const isActive = filter === id;
        return (
          <button
            onClick={() => setFilter(id)}
            className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 border whitespace-nowrap
              ${isActive ? `${activeColor} bg-white shadow-sm border-transparent ring-2 ring-slate-200` : 'text-slate-500 border-slate-200 hover:bg-slate-100 hover:text-slate-700'}
            `}
          >
            <Icon size={16} className={isActive ? '' : 'opacity-70'} />
            {label}
          </button>
        );
      };

      const ActionCard = ({ title, description, icon: Icon, colorClass, onClick }) => (
        <button 
          onClick={onClick}
          className="group w-full text-left bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-slate-300 transition-all duration-300 hover:-translate-y-0.5 flex flex-col justify-between min-h-[140px]"
        >
          <div className="flex justify-between items-start mb-3">
            <div className={`p-3 rounded-lg text-white ${colorClass}`}><Icon size={24} /></div>
            <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors border border-slate-100">
              <ArrowRight size={18} />
            </div>
          </div>
          <div>
            <h3 className="text-lg font-bold text-slate-800 mb-1">{title}</h3>
            <p className="text-sm text-slate-500 font-medium">{description}</p>
          </div>
        </button>
      );

      const DonutChart = ({ percentage, color, label, subLabel }) => {
        const radius = 35;
        const circumference = 2 * Math.PI * radius;
        const strokeDashoffset = circumference - (percentage / 100) * circumference;

        return (
          <div className="flex items-center gap-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex-1">
            <div className="relative w-20 h-20 flex-shrink-0">
              <svg className="w-full h-full transform -rotate-90">
                <circle cx="40" cy="40" r={radius} fill="transparent" stroke="#f1f5f9" strokeWidth="8" />
                <circle cx="40" cy="40" r={radius} fill="transparent" stroke={color} strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="transition-all duration-1000 ease-out" />
              </svg>
              <div className="absolute inset-0 flex items-center justify-center">
                <span className="text-sm font-bold text-slate-800">{Math.round(percentage)}%</span>
              </div>
            </div>
            <div>
              <p className="text-sm font-bold text-slate-800 mb-1">{label}</p>
              <p className="text-xs font-medium text-slate-500">{subLabel}</p>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#F3F4F6] flex flex-col text-slate-800 font-sans selection:bg-blue-100">
          
          {/* --- CABEÇALHO --- */}
          <header className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10 shadow-sm">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-md shadow-blue-600/20">
                  <CalendarIcon size={20} strokeWidth={2.5} />
                </div>
                <div>
                  <h1 className="text-lg md:text-xl font-bold tracking-tight text-slate-900">CorpCalendar</h1>
                  <p className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider">Caucaia - CE</p>
                </div>
              </div>
              <div className="bg-slate-100 rounded-md px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm font-semibold text-slate-600 flex items-center gap-2 border border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" onClick={goToToday}>
                <Clock size={16} className="text-blue-500" />
                <span className="hidden md:inline">Ir para Hoje</span>
              </div>
            </div>
          </header>

          {/* --- ÁREA PRINCIPAL --- */}
          <main className="flex-1 overflow-x-hidden p-6 md:p-10 lg:p-14 pb-safe flex flex-col gap-8">
            <div className="max-w-6xl mx-auto w-full">
              
              {/* GRID PRINCIPAL DE BLOCOS */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                {/* Coluna Esquerda: Calendário e RH */}
                <div className="lg:col-span-2 space-y-8">
                  
                  {/* BLOCO 1: CALENDÁRIO SEMANAL MELHORADO */}
                  <section className="bg-white p-5 md:p-6 rounded-xl border border-slate-200 shadow-sm">
                    {/* Cabeçalho do Calendário Compacto */}
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-3 flex-wrap">
                        <h3 className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2 capitalize">
                          <CalendarIcon size={20} className="text-blue-500" /> 
                          {new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(viewDate)}
                        </h3>
                        <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md text-[10px] md:text-xs font-bold border border-blue-100 uppercase tracking-wider">
                          Semana {currentWeekNumber} de 52
                        </span>
                      </div>
                      
                      {/* Setas ocultas no mobile (hidden), visíveis a partir de telas médias (md:flex) */}
                      <div className="hidden md:flex gap-2">
                        <button onClick={prevWeek} className="p-1.5 rounded-lg bg-slate-50 hover:bg-slate-100 hover:text-blue-600 text-slate-500 transition-colors border border-slate-200 shadow-sm"><ChevronLeft size={20} /></button>
                        <button onClick={nextWeek} className="p-1.5 rounded-lg bg-slate-50 hover:bg-slate-100 hover:text-blue-600 text-slate-500 transition-colors border border-slate-200 shadow-sm"><ChevronRight size={20} /></button>
                      </div>
                    </div>
                    
                    {/* Linha dos Dias - Agora mais arredondada e com pontinhos de notificação */}
                    <div 
                      ref={scrollContainerRef}
                      className="flex overflow-x-auto hide-scrollbar gap-2 md:gap-4 pb-2 md:grid md:grid-cols-7 snap-x snap-mandatory"
                    >
                      {currentWeekDays.map((day, index) => {
                        const isActualToday = isSameDay(day, todayDate); 
                        const dayName = new Intl.DateTimeFormat('pt-BR', { weekday: 'short' }).format(day).replace('.', '');
                        const dayNum = day.getDate();
                        
                        // Lógica para detetar se há evento ou feriado neste dia
                        const hasHrEvent = MOCK_HR_EVENTS.some(e => isSameDay(new Date(e.date + 'T12:00:00'), day));
                        const hasHoliday = MOCK_HOLIDAYS.some(h => isSameDay(new Date(h.date + 'T12:00:00'), day));
                        
                        return (
                          <div 
                            key={index} 
                            ref={isActualToday ? todayRef : null}
                            className={`
                              snap-center flex-shrink-0 w-20 md:w-auto flex flex-col items-center justify-center py-4 px-2 rounded-2xl border transition-all duration-300 relative
                              ${isActualToday 
                                ? 'bg-gradient-to-b from-blue-500 to-blue-600 border-blue-600 text-white shadow-lg shadow-blue-500/30 transform scale-[1.05]' 
                                : 'bg-white border-slate-200 text-slate-700 hover:border-blue-300 hover:bg-blue-50 hover:text-blue-700'}
                            `}
                          >
                            <span className={`text-[10px] md:text-xs font-bold uppercase tracking-wider mb-1.5 ${isActualToday ? 'text-blue-100' : 'text-slate-400'}`}>
                              {dayName}
                            </span>
                            <span className={`text-2xl md:text-3xl font-black ${isActualToday ? 'text-white' : 'text-slate-800'}`}>
                              {dayNum}
                            </span>
                            {/* Pontinhos indicadores (Dots) */}
                            <div className="absolute bottom-1.5 flex gap-1">
                               {hasHrEvent && <span className={`w-1.5 h-1.5 rounded-full ${isActualToday ? 'bg-white' : 'bg-indigo-500'}`}></span>}
                               {hasHoliday && <span className={`w-1.5 h-1.5 rounded-full ${isActualToday ? 'bg-blue-200' : 'bg-emerald-500'}`}></span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </section>

                  {/* BLOCO 2: INFORMES DE RH (REVERTIDO PARA O ESTILO ESPAÇOSO) */}
                  <section className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <div className="flex items-center justify-between mb-6">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <div className="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg">
                           <Briefcase size={20} />
                        </div>
                        Mural do RH
                      </h3>
                      <span className="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-indigo-100">
                        {MOCK_HR_EVENTS.length} Informes
                      </span>
                    </div>

                    <div className="flex flex-col gap-5">
                      {MOCK_HR_EVENTS.map(event => (
                        <div key={event.id} className="bg-slate-50 p-5 md:p-6 rounded-xl border border-slate-200 hover:border-indigo-300 hover:shadow-md transition-all relative overflow-hidden group">
                          <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-indigo-500 group-hover:w-2 transition-all"></div>
                          
                          <div className="flex justify-between items-start mb-4 pl-2">
                            <h4 className="font-bold text-slate-900 pr-4 text-lg">{event.name}</h4>
                            <span className="text-[10px] font-bold px-3 py-1.5 bg-white text-indigo-700 rounded-lg whitespace-nowrap border border-slate-200 shadow-sm uppercase tracking-wider flex-shrink-0">
                              {event.department}
                            </span>
                          </div>
                          
                          <div className="flex flex-col sm:flex-row gap-3 sm:gap-6 text-sm text-slate-500 font-medium pl-2">
                            <span className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-md border border-slate-100 w-fit">
                              <CalendarIcon size={16} className="text-indigo-400"/> 
                              {new Date(event.date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' })}
                            </span>
                            <span className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-md border border-slate-100 w-fit">
                              <Clock size={16} className="text-indigo-400"/> 
                              {event.time}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>

                </div>

                {/* Coluna Direita: Cartões de Ação */}
                <div className="space-y-6">
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Módulos do Sistema</h3>
                  
                  <ActionCard 
                    title="Lista de Feriados" 
                    description="Feriados nacionais, estaduais e municipais" 
                    icon={Flag} 
                    colorClass="bg-gradient-to-br from-emerald-500 to-emerald-600"
                    onClick={() => setIsHolidayModalOpen(true)}
                  />
                </div>

              </div>
              
              {/* BLOCO INFERIOR: STATUS DO ANO */}
              <div className="mt-8 pt-8 border-t border-slate-200">
                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <Clock size={20} className="text-slate-500" />
                  Progresso do Ano ({todayDate.getFullYear()})
                </h3>
                <div className="flex flex-col md:flex-row gap-4 lg:gap-8">
                   <DonutChart 
                     percentage={yearProgress.daysPercentage} 
                     color="#3b82f6" 
                     label="Dias Decorridos" 
                     subLabel={`${yearProgress.elapsedDays} de ${yearProgress.totalDays} dias`}
                   />
                   <DonutChart 
                     percentage={yearProgress.weeksPercentage} 
                     color="#6366f1" 
                     label="Semanas Decorridas" 
                     subLabel={`${yearProgress.elapsedWeeks} de ${yearProgress.totalWeeks} semanas`}
                   />
                </div>
              </div>

              {/* Cartão Informativo Estático no Fim */}
              <div className="mt-8 bg-slate-800 p-6 md:p-8 rounded-xl border border-slate-700 text-white shadow-lg relative overflow-hidden">
                <div className="absolute top-0 right-0 p-4 opacity-5 pointer-events-none transform translate-x-4 -translate-y-10">
                   <CalendarIcon size={160} />
                </div>
                <div className="relative z-10 flex flex-col md:flex-row md:items-center gap-4 md:gap-6">
                  <div className="p-4 bg-slate-700/50 rounded-xl w-fit flex-shrink-0 border border-slate-600">
                    <FileText size={28} className="text-blue-400" />
                  </div>
                  <div>
                    <h3 className="text-xl font-bold mb-2">Precisa de ajuda com o painel?</h3>
                    <p className="text-sm md:text-base text-slate-400 font-medium leading-relaxed max-w-3xl">
                      Este painel centraliza as datas cruciais da sua rotina corporativa. Utilize as setas no calendário no topo para navegar pelas semanas e acompanhe as métricas globais do ano nos gráficos acima.
                    </p>
                  </div>
                </div>
              </div>

            </div>
          </main>

          {/* ================= MODAIS ================= */}

          {/* Modal: Feriados com Filtros */}
          <Modal isOpen={isHolidayModalOpen} onClose={() => setIsHolidayModalOpen(false)} title="Feriados Oficiais" icon={Flag} colorClass="bg-emerald-500">
            <div className="mb-6 overflow-x-auto hide-scrollbar pb-2">
              <div className="flex gap-2 w-max">
                <FilterButton id="todos" label="Todos" icon={Filter} activeColor="text-slate-800" />
                <FilterButton id="nacional" label="Nacional" icon={Flag} activeColor="text-emerald-600" />
                <FilterButton id="estadual" label="Estadual (CE)" icon={MapPin} activeColor="text-blue-600" />
                <FilterButton id="municipal" label="Municipal (Caucaia)" icon={MapPin} activeColor="text-amber-600" />
              </div>
            </div>

            <div className="space-y-3">
              {filteredHolidays.map(holiday => {
                let badgeClass = '';
                if (holiday.type === 'nacional') badgeClass = 'bg-emerald-50 text-emerald-700 border-emerald-200';
                else if (holiday.type === 'estadual') badgeClass = 'bg-blue-50 text-blue-700 border-blue-200';
                else badgeClass = 'bg-amber-50 text-amber-700 border-amber-200';

                const holidayDate = new Date(holiday.date + 'T12:00:00');
                const isPast = holidayDate < todayDate && !isSameDay(holidayDate, todayDate);
                
                // Verifica se este feriado é um dos próximos 2
                const isNextHoliday = upcomingHolidaysList.includes(holiday.id);

                return (
                  <div key={holiday.id} className={`flex items-center gap-4 bg-white p-4 rounded-xl border shadow-sm transition-all
                    ${isPast ? 'border-slate-100 opacity-60 bg-slate-50' : 'border-slate-200 hover:shadow-md hover:border-emerald-300'}
                    ${isNextHoliday ? 'ring-2 ring-emerald-400 shadow-md' : ''}
                  `}>
                    <div className={`flex flex-col items-center justify-center min-w-[4.5rem] p-2 rounded-lg border 
                      ${isPast ? 'bg-slate-100 border-slate-200' : 'bg-slate-50 border-slate-100'}
                    `}>
                      <span className={`text-xs font-bold uppercase ${isPast ? 'text-slate-400 line-through' : 'text-slate-500'}`}>
                        {new Intl.DateTimeFormat('pt-BR', { month: 'short' }).format(holidayDate).replace('.','')}
                      </span>
                      <span className={`text-2xl font-black ${isPast ? 'text-slate-400 line-through' : 'text-slate-800'}`}>
                        {holidayDate.getDate()}
                      </span>
                    </div>
                    
                    <div className="flex-1">
                      <div className="flex flex-wrap items-center gap-2 mb-2">
                        <h4 className={`font-bold text-sm md:text-base ${isPast ? 'text-slate-500 line-through' : 'text-slate-900'}`}>
                          {holiday.name}
                        </h4>
                        
                        {/* Selo de Próximo Feriado */}
                        {isNextHoliday && (
                          <span className="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold bg-amber-100 text-amber-800 border border-amber-200 uppercase tracking-widest animate-pulse">
                            Próximo
                          </span>
                        )}
                      </div>

                      <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-bold border uppercase tracking-wider ${badgeClass} ${isPast ? 'opacity-70' : ''}`}>
                        {holiday.type}
                      </span>
                    </div>
                  </div>
                );
              })}
              {filteredHolidays.length === 0 && (
                <div className="text-center p-8 bg-white border-2 border-dashed border-slate-200 rounded-xl text-slate-500 font-medium">
                  Nenhum feriado encontrado.
                </div>
              )}
            </div>
          </Modal>

        </div>
      );
    }

    // Inicializa a aplicação React no HTML
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
