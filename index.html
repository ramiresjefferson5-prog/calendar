<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário Corporativo</title>
  
  <!-- Carrega o React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Carrega o Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Carrega o Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Carrega o Supabase (Biblioteca de Base de Dados) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #F3F4F6; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-animate {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- CONFIGURAÇÃO DO SUPABASE ---
    const supabaseUrl = 'https://pwmgbaxywvyyfmlkygqr.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3bWdiYXh5d3Z5eWZtbGt5Z3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDI3NDAsImV4cCI6MjA5MjkxODc0MH0.kSYonDj0VBHjMZuVlGeVQjAuMmbEBMQfB4OsBcZOecg';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // --- ÍCONES ---
    const CalendarIcon = ({ size=24, className="", strokeWidth=2 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const MapPin = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Briefcase = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>;
    const Flag = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>;
    const Filter = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
    const ChevronRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const ChevronLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const Clock = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const X = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const ArrowRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
    const FileText = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
    const DollarSign = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
    const PlusCircle = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
    const Lock = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const Unlock = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;
    const Paperclip = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>;
    const Users = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const LogOut = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;

    const SECTORS = ['Administrativo', 'Comercial', 'RH', 'Compras', 'Diretoria', 'Engenharia e PD&I', 'Produção', 'Financeiro', 'Almoxarifado'];

    function App() {
      // --- ESTADOS (State) ---
      const todayDate = new Date(); // Agora utiliza a data atual real do sistema
      const [viewDate, setViewDate] = useState(todayDate); 
      const [filter, setFilter] = useState('todos'); 
      
      // Estados de Base de Dados
      const [hrEvents, setHrEvents] = useState([]);
      const [dbHolidays, setDbHolidays] = useState([]);
      
      // Estados de Autenticação
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [isAuthModalOpen, setIsAuthModalOpen] = useState(false);
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [authLoading, setAuthLoading] = useState(false);

      // Estados de Modais UI
      const [isHolidayModalOpen, setIsHolidayModalOpen] = useState(false);
      const [isMonthModalOpen, setIsMonthModalOpen] = useState(false);
      const [isDayModalOpen, setIsDayModalOpen] = useState(false);
      const [isAdminModalOpen, setIsAdminModalOpen] = useState(false);
      const [selectedDay, setSelectedDay] = useState(null);

      // Estado do Formulário de Inserção
      const [adminSelectedDate, setAdminSelectedDate] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formData, setFormData] = useState({
        type: 'Evento', department: 'RH', classification: 'Geral',
        title: '', description: '', startTime: '09:00', endTime: '10:00',
        location: '', targetRoles: '', hasPeriod: false, originalDate: '', newDate: '',
        file: null // Armazena o ficheiro físico
      });

      const scrollContainerRef = useRef(null);
      const todayRef = useRef(null);

      // --- BUSCA DE DADOS INICIAIS (SUPABASE) ---
      useEffect(() => {
        // Verificar sessão ativa
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
        });

        // Escutar alterações na autenticação (Login/Logout)
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });

        fetchData(); // Busca inicial de eventos e feriados

        return () => subscription.unsubscribe();
      }, []);

      // Busca perfil sempre que o user muda para saber se é admin
      useEffect(() => {
        if (user) {
          const fetchProfile = async () => {
            const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (data) setProfile(data);
          };
          fetchProfile();
        } else {
          setProfile(null);
        }
      }, [user]);

      const fetchData = async () => {
        // Busca Eventos
        const { data: eventsData } = await supabase.from('events').select('*');
        if (eventsData) setHrEvents(eventsData);
        
        // Busca Feriados
        const { data: holidaysData } = await supabase.from('holidays').select('*');
        if (holidaysData) setDbHolidays(holidaysData);
      };

      // --- LÓGICA DE AUTENTICAÇÃO ---
      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthLoading(true);
        if (isSignUp) {
          // Criar Conta
          const { data, error } = await supabase.auth.signUp({ email: authEmail, password: authPassword, options: { data: { full_name: 'Usuário' } } });
          if (error) alert('Erro ao criar conta: ' + error.message);
          else { alert('Conta criada com sucesso! Pode entrar.'); setIsSignUp(false); }
        } else {
          // Fazer Login
          const { data, error } = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword });
          if (error) alert('Erro no login: Credenciais incorretas.');
          else setIsAuthModalOpen(false);
        }
        setAuthLoading(false);
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
      };

      // --- LÓGICA DE ADMINISTRAÇÃO (SALVAR NO SUPABASE) ---
      const handleFormSubmit = async (e) => {
        e.preventDefault();
        if (!adminSelectedDate || !formData.title.trim()) return;
        setIsSubmitting(true);

        let attachmentPath = null;
        
        // 1. Faz upload do anexo se existir
        if (formData.file) {
          const fileExt = formData.file.name.split('.').pop();
          const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
          
          const { data: uploadData, error: uploadError } = await supabase.storage
            .from('arquivos avisos')
            .upload(`anexos/${fileName}`, formData.file);
          
          if (uploadError) {
            alert('Erro ao fazer upload do arquivo: ' + uploadError.message);
            setIsSubmitting(false);
            return;
          }
          attachmentPath = uploadData.path;
        }

        // 2. Formata a data para a base de dados
        const yyyy = adminSelectedDate.getFullYear();
        const mm = String(adminSelectedDate.getMonth() + 1).padStart(2, '0');
        const dd = String(adminSelectedDate.getDate()).padStart(2, '0');
        const dateString = `${yyyy}-${mm}-${dd}`;

        // 3. Prepara o Objeto para inserir no Supabase
        const newEventData = {
          date: dateString,
          title: formData.title,
          description: formData.description,
          type: formData.type,
          department: formData.department,
          has_attachment: !!formData.file,
          attachment_path: attachmentPath,
          created_by: user?.id,
          // Condicionais
          start_time: formData.type === 'Evento' || (formData.type === 'Informe' && formData.hasPeriod) ? formData.startTime : null,
          end_time: formData.type === 'Evento' || (formData.type === 'Informe' && formData.hasPeriod) ? formData.endTime : null,
          location: formData.type === 'Evento' ? formData.location : null,
          target_roles: formData.type === 'Evento' ? formData.targetRoles : null,
          classification: formData.type === 'Informe' ? formData.classification : null,
          has_period: formData.type === 'Informe' ? formData.hasPeriod : false,
          original_date: formData.type === 'Alteração de Folga' || formData.type === 'Troca de Feriado' ? formData.originalDate : null,
          new_date: formData.type === 'Alteração de Folga' || formData.type === 'Troca de Feriado' ? formData.newDate : null,
        };

        const { error } = await supabase.from('events').insert([newEventData]);
        
        setIsSubmitting(false);
        
        if (error) {
          alert('Erro ao salvar no banco de dados: ' + error.message);
        } else {
          alert('Registro adicionado com sucesso!');
          setAdminSelectedDate(null);
          setFormData({ type: 'Evento', department: 'RH', classification: 'Geral', title: '', description: '', startTime: '09:00', endTime: '10:00', location: '', targetRoles: '', hasPeriod: false, originalDate: '', newDate: '', file: null });
          fetchData(); // Atualiza a tela com o novo dado
        }
      };

      // --- LÓGICA DE NAVEGAÇÃO UI ---
      const nextWeek = () => { const newDate = new Date(viewDate); newDate.setDate(viewDate.getDate() + 7); setViewDate(newDate); };
      const prevWeek = () => { const newDate = new Date(viewDate); newDate.setDate(viewDate.getDate() - 7); setViewDate(newDate); };
      const goToToday = () => setViewDate(todayDate);
      const openDayDetails = (day) => { setSelectedDay(day); setIsDayModalOpen(true); };

      useEffect(() => {
        if (todayRef.current && scrollContainerRef.current && !isAdminModalOpen) {
          const container = scrollContainerRef.current;
          const element = todayRef.current;
          const scrollPosition = element.offsetLeft - (container.offsetWidth / 2) + (element.offsetWidth / 2);
          container.scrollTo({ left: scrollPosition, behavior: 'smooth' });
        }
      }, [viewDate, isAdminModalOpen]); 

      // --- LÓGICA DE DATAS E PROGRESSO ---
      const isSameDay = (d1, d2) => d1 && d2 && d1.getDate() === d2.getDate() && d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
      const formatFullDate = (date) => {
        if (!date) return '';
        const formatted = new Intl.DateTimeFormat('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(date);
        return formatted.charAt(0).toUpperCase() + formatted.slice(1);
      };

      const yearProgress = useMemo(() => {
        const year = todayDate.getFullYear();
        const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        const totalDays = isLeapYear ? 366 : 365;
        const diffTime = Math.abs(todayDate - new Date(year, 0, 1));
        const elapsedDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
        const elapsedWeeks = Math.ceil(elapsedDays / 7);
        return { elapsedDays, totalDays, daysPercentage: ((elapsedDays / totalDays) * 100).toFixed(1), elapsedWeeks, totalWeeks: 52, weeksPercentage: ((elapsedWeeks / 52) * 100).toFixed(1) };
      }, [todayDate]);

      const currentWeekNumber = useMemo(() => {
        const days = Math.floor((viewDate - new Date(viewDate.getFullYear(), 0, 1)) / (24 * 60 * 60 * 1000));
        return Math.ceil((viewDate.getDay() + 1 + days) / 7);
      }, [viewDate]);

      const monthWeeks = useMemo(() => {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let weeks = [], currentWeek = [];
        for (let i = 0; i < new Date(year, month, 1).getDay(); i++) currentWeek.push(null);
        for (let i = 1; i <= daysInMonth; i++) {
          currentWeek.push(new Date(year, month, i));
          if (currentWeek.length === 7) { weeks.push(currentWeek); currentWeek = []; }
        }
        if (currentWeek.length > 0) {
          while (currentWeek.length < 7) currentWeek.push(null);
          weeks.push(currentWeek);
        }
        return weeks;
      }, [viewDate]);

      const currentWeekDays = useMemo(() => {
        const startDate = new Date(viewDate);
        startDate.setDate(viewDate.getDate() - viewDate.getDay()); 
        return Array.from({length: 7}, (_, i) => { const d = new Date(startDate); d.setDate(startDate.getDate() + i); return d; });
      }, [viewDate]);

      const allYearMonths = useMemo(() => {
        const year = todayDate.getFullYear();
        return Array.from({length: 12}, (_, m) => ({
          name: new Intl.DateTimeFormat('pt-BR', { month: 'long' }).format(new Date(year, m, 1)),
          days: Array.from({length: new Date(year, m + 1, 0).getDate()}, (_, d) => new Date(year, m, d + 1))
        }));
      }, [todayDate]);

      const upcomingHolidaysList = useMemo(() => {
        return dbHolidays.map(h => ({ ...h, exactDate: new Date(h.date + 'T12:00:00') }))
          .filter(h => h.exactDate >= todayDate || isSameDay(h.exactDate, todayDate))
          .sort((a, b) => a.exactDate - b.exactDate).slice(0, 2).map(h => h.id);
      }, [todayDate, dbHolidays]);

      const filteredHolidays = useMemo(() => filter === 'todos' ? dbHolidays : dbHolidays.filter(h => h.type === filter), [filter, dbHolidays]);

      // --- COMPONENTES UI: EventCard ---
      const EventCard = ({ event }) => {
        let borderClass = "border-indigo-200";
        let ribbonClass = "bg-indigo-500";
        if(event.classification === 'Urgente') { borderClass = "border-red-300"; ribbonClass = "bg-red-500"; }
        if(event.type === 'Alteração de Folga' || event.type === 'Troca de Feriado') { borderClass = "border-amber-300"; ribbonClass = "bg-amber-500"; }
        if(event.type === 'Faturamento') { borderClass = "border-amber-200"; ribbonClass = "bg-amber-400"; }

        // Formata os horários que vêm do banco como "09:00:00" para "09:00"
        const formatTime = (timeStr) => timeStr ? timeStr.substring(0, 5) : '';

        // Obter URL do anexo se existir
        const getAttachmentUrl = () => {
          if (event.has_attachment && event.attachment_path) {
            const { data } = supabase.storage.from('arquivos avisos').getPublicUrl(event.attachment_path);
            return data.publicUrl;
          }
          return null;
        };

        const fileUrl = getAttachmentUrl();

        return (
          <div className={`bg-white p-4 md:p-6 rounded-xl border ${borderClass} hover:shadow-md transition-all relative overflow-hidden group`}>
            <div className={`absolute left-0 top-0 bottom-0 w-1.5 transition-all group-hover:w-2 ${ribbonClass}`}></div>
            
            <div className="flex justify-between items-start mb-3 pl-2">
              <div>
                <h4 className="font-bold text-slate-900 pr-4 text-base md:text-lg mb-1">{event.title}</h4>
                <div className="flex flex-wrap gap-2 items-center">
                  <span className="text-[9px] font-bold px-2 py-0.5 bg-slate-100 text-slate-700 rounded border border-slate-200 uppercase tracking-wider">{event.type}</span>
                  {event.type === 'Informe' && event.classification && (
                    <span className={`text-[9px] font-bold px-2 py-0.5 rounded border uppercase tracking-wider ${event.classification === 'Urgente' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-blue-50 text-blue-700 border-blue-200'}`}>
                      {event.classification}
                    </span>
                  )}
                  {event.department && (
                    <span className="text-[9px] font-bold px-2 py-0.5 bg-indigo-50 text-indigo-700 rounded border border-indigo-100 uppercase tracking-wider">
                      {event.department}
                    </span>
                  )}
                </div>
              </div>
              
              {fileUrl && (
                <a href={fileUrl} target="_blank" rel="noopener noreferrer" className="p-1.5 bg-slate-50 hover:bg-blue-50 text-slate-500 hover:text-blue-600 rounded-md border border-slate-200 transition-colors flex-shrink-0" title="Ver Anexo">
                  <Paperclip size={18} />
                </a>
              )}
            </div>
            
            <div className="flex flex-col gap-2.5 text-sm text-slate-600 font-medium pl-2 mt-4">
              {/* Eventos ou Informes com Período */}
              {(event.type === 'Evento' || (event.type === 'Informe' && event.has_period)) && (
                <div className="flex flex-wrap gap-3">
                  <span className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md border border-slate-100 text-xs">
                    <CalendarIcon size={14} className="text-slate-400"/> 
                    {new Date(event.date + 'T12:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' })}
                  </span>
                  {event.start_time && (
                    <span className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md border border-slate-100 text-xs text-indigo-700 font-bold">
                      <Clock size={14} className="text-indigo-400"/> 
                      {formatTime(event.start_time)} {event.end_time ? `- ${formatTime(event.end_time)}` : ''}
                    </span>
                  )}
                </div>
              )}

              {/* Alteração Folga / Troca Feriado */}
              {(event.type === 'Alteração de Folga' || event.type === 'Troca de Feriado') && (
                <div className="flex flex-wrap items-center gap-2 bg-amber-50 px-3 py-2 rounded-md border border-amber-100 text-xs w-fit">
                  <span className="text-amber-700 font-bold">De:</span>
                  <span className="bg-white px-2 py-0.5 rounded border border-amber-200">{event.original_date ? event.original_date.split('-').reverse().join('/') : '---'}</span>
                  <ArrowRight size={14} className="text-amber-500 mx-1" />
                  <span className="text-amber-700 font-bold">Para:</span>
                  <span className="bg-white px-2 py-0.5 rounded border border-amber-200 font-bold">{event.new_date ? event.new_date.split('-').reverse().join('/') : '---'}</span>
                </div>
              )}

              {/* Faturamento (Exibição simplificada) */}
              {event.type === 'Faturamento' && event.billing_value && (
                <span className="flex items-center gap-2 text-xs font-bold text-amber-700">
                  <DollarSign size={14} className="text-amber-500" /> Valor: {event.billing_value}
                </span>
              )}

              {/* Detalhes Específicos de Evento */}
              {event.type === 'Evento' && event.location && (
                <span className="flex items-center gap-2 text-xs">
                  <MapPin size={14} className="text-slate-400" /> <span className="text-slate-700">{event.location}</span>
                </span>
              )}
              {event.type === 'Evento' && event.target_roles && (
                <span className="flex items-center gap-2 text-xs">
                  <Users size={14} className="text-slate-400" /> <span className="text-slate-700">Público: {event.target_roles}</span>
                </span>
              )}

              {/* Descrição Global */}
              {event.description && (
                <div className="mt-2 text-xs text-slate-500 bg-slate-50/50 p-3 rounded-lg border border-slate-100 italic">
                  {event.description}
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- OUTROS COMPONENTES UI ---
      const Modal = ({ isOpen, onClose, title, children, icon: Icon, colorClass }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-6 pb-0">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
            <div className="relative w-full h-full md:h-auto md:max-h-[90vh] md:max-w-4xl bg-white md:rounded-2xl shadow-2xl flex flex-col overflow-hidden modal-animate mt-12 md:mt-0 rounded-t-2xl md:rounded-t-2xl">
              <div className="w-full flex justify-center pt-3 pb-1 md:hidden bg-white" onClick={onClose}><div className="w-12 h-1.5 bg-slate-200 rounded-full"></div></div>
              <div className="flex items-center justify-between p-4 md:p-6 border-b border-slate-100 bg-white z-10">
                <div className="flex items-center gap-3">
                  <div className={`p-2 rounded-lg text-white flex-shrink-0 ${colorClass}`}><Icon size={24} /></div>
                  <h3 className="text-lg md:text-2xl font-bold text-slate-800 leading-tight">{title}</h3>
                </div>
                <button onClick={onClose} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors border border-slate-200 flex-shrink-0 ml-2"><X size={20} /></button>
              </div>
              <div className="p-4 md:p-8 overflow-y-auto flex-1 hide-scrollbar bg-slate-50/50">{children}</div>
            </div>
          </div>
        );
      };

      const FilterButton = ({ id, label, icon: Icon, activeColor }) => {
        const isActive = filter === id;
        return (
          <button onClick={() => setFilter(id)} className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all duration-200 border whitespace-nowrap ${isActive ? `${activeColor} bg-white shadow-sm border-transparent ring-2 ring-slate-200` : 'text-slate-500 border-slate-200 hover:bg-slate-100 hover:text-slate-700'}`}>
            <Icon size={16} className={isActive ? '' : 'opacity-70'} /> {label}
          </button>
        );
      };

      const ActionCard = ({ title, description, icon: Icon, colorClass, onClick }) => (
        <button onClick={onClick} className="group w-full text-left bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-slate-300 transition-all duration-300 hover:-translate-y-0.5 flex flex-col justify-between min-h-[140px]">
          <div className="flex justify-between items-start mb-3">
            <div className={`p-3 rounded-lg text-white ${colorClass}`}><Icon size={24} /></div>
            <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors border border-slate-100"><ArrowRight size={18} /></div>
          </div>
          <div><h3 className="text-lg font-bold text-slate-800 mb-1">{title}</h3><p className="text-sm text-slate-500 font-medium">{description}</p></div>
        </button>
      );

      const DonutChart = ({ percentage, color, label, subLabel }) => {
        const radius = 35; const circumference = 2 * Math.PI * radius; const strokeDashoffset = circumference - (percentage / 100) * circumference;
        return (
          <div className="flex items-center gap-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex-1 w-full">
            <div className="relative w-20 h-20 flex-shrink-0">
              <svg className="w-full h-full transform -rotate-90"><circle cx="40" cy="40" r={radius} fill="transparent" stroke="#f1f5f9" strokeWidth="8" /><circle cx="40" cy="40" r={radius} fill="transparent" stroke={color} strokeWidth="8" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="transition-all duration-1000 ease-out" /></svg>
              <div className="absolute inset-0 flex items-center justify-center"><span className="text-sm font-bold text-slate-800">{Math.round(percentage)}%</span></div>
            </div>
            <div><p className="text-sm font-bold text-slate-800 mb-1">{label}</p><p className="text-xs font-medium text-slate-500">{subLabel}</p></div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-[#F3F4F6] flex flex-col text-slate-800 font-sans selection:bg-blue-100 w-full">
          
          <header className="bg-white border-b border-slate-200 px-4 md:px-8 py-4 sticky top-0 z-10 shadow-sm w-full">
            <div className="w-full flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-md shadow-blue-600/20"><CalendarIcon size={20} strokeWidth={2.5} /></div>
                <div><h1 className="text-lg md:text-xl font-bold tracking-tight text-slate-900">CorpCalendar</h1><p className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider">Caucaia - CE</p></div>
              </div>
              <div className="flex items-center gap-2 md:gap-4">
                <div className="bg-slate-100 rounded-md px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm font-semibold text-slate-600 flex items-center gap-2 border border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" onClick={goToToday}><Clock size={16} className="text-blue-500" /><span className="hidden md:inline">Hoje</span></div>
                
                {/* Botão Adicionar apenas se for Admin validado pelo Supabase */}
                {user && profile?.is_admin && (
                  <button onClick={() => setIsAdminModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white rounded-md px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm font-bold flex items-center gap-2 shadow-sm transition-colors shadow-indigo-600/20">
                    <PlusCircle size={16} /><span className="hidden sm:inline">Adicionar</span>
                  </button>
                )}
                
                {/* Botão de Login / Perfil */}
                {user ? (
                  <button onClick={handleLogout} className="p-1.5 md:p-2 rounded-md border transition-colors bg-amber-50 text-amber-700 border-amber-200 hover:bg-amber-100" title="Sair da Conta">
                    <LogOut size={18} />
                  </button>
                ) : (
                  <button onClick={() => setIsAuthModalOpen(true)} className="p-1.5 md:p-2 rounded-md border transition-colors bg-white text-slate-400 border-slate-200 hover:bg-slate-50" title="Entrar (Modo Gestão)">
                    <Lock size={18} />
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="flex-1 overflow-x-hidden p-4 md:p-8 pb-safe flex flex-col gap-8 w-full">
            <div className="w-full">
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 w-full">
                
                <div className="lg:col-span-2 space-y-6 md:space-y-8 w-full">
                  <section className="bg-white p-4 md:p-6 rounded-xl border border-slate-200 shadow-sm w-full">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-3 flex-wrap">
                        <h3 onClick={() => setIsMonthModalOpen(true)} className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2 capitalize cursor-pointer hover:text-blue-600 transition-colors group">
                          <div className="p-1.5 bg-blue-50 text-blue-600 rounded-lg group-hover:bg-blue-100 transition-colors"><CalendarIcon size={20} /></div>
                          {new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(viewDate)}
                        </h3>
                        <span className="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md text-[10px] md:text-xs font-bold border border-blue-100 uppercase tracking-wider">S-{currentWeekNumber}</span>
                      </div>
                      <div className="hidden md:flex gap-2">
                        <button onClick={prevWeek} className="p-1.5 rounded-lg bg-slate-50 hover:bg-slate-100 hover:text-blue-600 text-slate-500 transition-colors border border-slate-200 shadow-sm"><ChevronLeft size={20} /></button>
                        <button onClick={nextWeek} className="p-1.5 rounded-lg bg-slate-50 hover:bg-slate-100 hover:text-blue-600 text-slate-500 transition-colors border border-slate-200 shadow-sm"><ChevronRight size={20} /></button>
                      </div>
                    </div>
                    <div ref={scrollContainerRef} className="flex overflow-x-auto hide-scrollbar gap-2 md:gap-4 pb-2 md:grid md:grid-cols-7 snap-x snap-mandatory">
                      {currentWeekDays.map((day, index) => {
                        const isActualToday = isSameDay(day, todayDate); 
                        const hasHrEvent = hrEvents.some(e => isSameDay(new Date(e.date + 'T12:00:00'), day) && e.type !== 'Faturamento');
                        const hasHoliday = dbHolidays.some(h => isSameDay(new Date(h.date + 'T12:00:00'), day));
                        return (
                          <div key={index} ref={isActualToday ? todayRef : null} onClick={() => openDayDetails(day)}
                            className={`cursor-pointer snap-center flex-shrink-0 w-20 md:w-auto flex flex-col items-center justify-center py-4 px-2 rounded-xl border transition-all duration-300 relative ${isActualToday ? 'bg-gradient-to-b from-blue-500 to-blue-600 border-blue-600 text-white shadow-lg shadow-blue-500/30 transform scale-[1.05]' : 'bg-white border-slate-200 text-slate-700 hover:border-blue-300 hover:bg-blue-50 hover:text-blue-700 hover:-translate-y-0.5'}`}
                          >
                            <span className={`text-[10px] md:text-xs font-bold uppercase tracking-wider mb-1.5 ${isActualToday ? 'text-blue-100' : 'text-slate-400'}`}>{new Intl.DateTimeFormat('pt-BR', { weekday: 'short' }).format(day).replace('.', '')}</span>
                            <span className={`text-2xl md:text-3xl font-black ${isActualToday ? 'text-white' : 'text-slate-800'}`}>{day.getDate()}</span>
                            <div className="absolute bottom-1.5 flex gap-1">
                               {hasHrEvent && <span className={`w-1.5 h-1.5 rounded-full ${isActualToday ? 'bg-white' : 'bg-indigo-500'}`}></span>}
                               {hasHoliday && <span className={`w-1.5 h-1.5 rounded-full ${isActualToday ? 'bg-blue-200' : 'bg-emerald-500'}`}></span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </section>

                  {/* BLOCO 2: MURAL DE RH */}
                  <section className="bg-white p-4 md:p-6 rounded-xl border border-slate-200 shadow-sm w-full">
                    <div className="flex items-center justify-between mb-6">
                      <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><div className="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg"><Briefcase size={20} /></div>Mural do RH</h3>
                      <span className="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-indigo-100">{hrEvents.filter(e => e.type !== 'Faturamento').length} Lançamentos</span>
                    </div>
                    <div className="flex flex-col gap-4">
                      {hrEvents.filter(e => e.type !== 'Faturamento').map(event => <EventCard key={event.id} event={event} />)}
                      {hrEvents.filter(e => e.type !== 'Faturamento').length === 0 && (
                        <div className="text-center p-6 text-slate-400 font-medium">Nenhum evento registrado no banco de dados.</div>
                      )}
                    </div>
                  </section>
                </div>

                <div className="space-y-6 w-full">
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Módulos do Sistema</h3>
                  <ActionCard title="Lista de Feriados" description="Feriados nacionais, estaduais e municipais" icon={Flag} colorClass="bg-gradient-to-br from-emerald-500 to-emerald-600" onClick={() => setIsHolidayModalOpen(true)} />
                </div>
              </div>
              
              <div className="mt-8 pt-8 border-t border-slate-200 w-full">
                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Clock size={20} className="text-slate-500" />Progresso do Ano ({todayDate.getFullYear()})</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-8 w-full">
                   <DonutChart percentage={yearProgress.daysPercentage} color="#3b82f6" label="Dias Decorridos" subLabel={`${yearProgress.elapsedDays} de ${yearProgress.totalDays} dias`} />
                   <DonutChart percentage={yearProgress.weeksPercentage} color="#6366f1" label="Semanas Decorridas" subLabel={`${yearProgress.elapsedWeeks} de ${yearProgress.totalWeeks} semanas`} />
                </div>
              </div>
            </div>
          </main>

          {/* ================= MODAIS UI ================= */}

          {/* Modal Feriados */}
          <Modal isOpen={isHolidayModalOpen} onClose={() => setIsHolidayModalOpen(false)} title="Feriados Oficiais" icon={Flag} colorClass="bg-emerald-500">
             <div className="mb-6 overflow-x-auto hide-scrollbar pb-2">
              <div className="flex gap-2 w-max">
                <FilterButton id="todos" label="Todos" icon={Filter} activeColor="text-slate-800" />
                <FilterButton id="nacional" label="Nacional" icon={Flag} activeColor="text-emerald-600" />
                <FilterButton id="estadual" label="Estadual (CE)" icon={MapPin} activeColor="text-blue-600" />
                <FilterButton id="municipal" label="Municipal (Caucaia)" icon={MapPin} activeColor="text-amber-600" />
              </div>
            </div>
             <div className="space-y-3">
              {filteredHolidays.map(holiday => {
                let badgeClass = holiday.type === 'nacional' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : holiday.type === 'estadual' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-amber-50 text-amber-700 border-amber-200';
                const holidayDate = new Date(holiday.date + 'T12:00:00');
                const isPast = holidayDate < todayDate && !isSameDay(holidayDate, todayDate);
                const isNextHoliday = upcomingHolidaysList.includes(holiday.id);
                return (
                  <div key={holiday.id} className={`flex items-center gap-3 md:gap-4 bg-white p-3 md:p-4 rounded-xl border shadow-sm transition-all ${isPast ? 'border-slate-100 opacity-60 bg-slate-50' : 'border-slate-200 hover:shadow-md'} ${isNextHoliday ? 'ring-2 ring-emerald-400 shadow-md' : ''}`}>
                    <div className={`flex flex-col items-center justify-center min-w-[4rem] md:min-w-[4.5rem] p-2 rounded-lg border ${isPast ? 'bg-slate-100 border-slate-200' : 'bg-slate-50 border-slate-100'}`}>
                      <span className={`text-[10px] md:text-xs font-bold uppercase ${isPast ? 'text-slate-400 line-through' : 'text-slate-500'}`}>{new Intl.DateTimeFormat('pt-BR', { month: 'short' }).format(holidayDate).replace('.','')}</span>
                      <span className={`text-xl md:text-2xl font-black ${isPast ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{holidayDate.getDate()}</span>
                    </div>
                    <div className="flex-1 overflow-hidden">
                      <div className="flex flex-wrap items-center gap-2 mb-1.5 md:mb-2">
                        <h4 className={`font-bold text-sm md:text-base truncate w-full sm:w-auto ${isPast ? 'text-slate-500 line-through' : 'text-slate-900'}`}>{holiday.name}</h4>
                        {isNextHoliday && <span className="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold bg-amber-100 text-amber-800 border border-amber-200 uppercase tracking-widest animate-pulse">Próximo</span>}
                      </div>
                      <span className={`inline-flex items-center px-2 py-0.5 md:px-2.5 md:py-1 rounded-md text-[9px] md:text-[10px] font-bold border uppercase tracking-wider ${badgeClass} ${isPast ? 'opacity-70' : ''}`}>{holiday.type}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </Modal>

          {/* Modal Dia Específico */}
          <Modal isOpen={isDayModalOpen} onClose={() => setIsDayModalOpen(false)} title={formatFullDate(selectedDay)} icon={CalendarIcon} colorClass="bg-blue-500">
            {selectedDay && (() => {
               const dayEvents = hrEvents.filter(e => isSameDay(new Date(e.date + 'T12:00:00'), selectedDay) && e.type !== 'Faturamento');
               const dayHolidays = dbHolidays.filter(h => isSameDay(new Date(h.date + 'T12:00:00'), selectedDay));
               const dayBillings = hrEvents.filter(b => isSameDay(new Date(b.date + 'T12:00:00'), selectedDay) && b.type === 'Faturamento');
               const hasNothing = dayEvents.length === 0 && dayHolidays.length === 0 && dayBillings.length === 0;

               return (
                 <div className="space-y-8">
                   {hasNothing && (
                     <div className="text-center p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl text-slate-500 font-medium flex flex-col items-center justify-center">
                       <Clock size={32} className="text-slate-300 mb-3" /><p>Não há feriados, nem eventos ou faturamentos programados para este dia.</p>
                     </div>
                   )}

                   {dayHolidays.length > 0 && (
                     <div className="bg-emerald-50/50 p-4 md:p-6 rounded-xl border border-emerald-100">
                       <h4 className="text-sm font-bold text-emerald-800 uppercase tracking-wider mb-4 flex items-center gap-2"><Flag size={18} /> Feriados neste dia</h4>
                       <div className="space-y-3">
                         {dayHolidays.map(holiday => (
                           <div key={holiday.id} className="flex items-center gap-4 bg-white p-4 rounded-xl border border-emerald-200 shadow-sm ring-1 ring-emerald-50">
                              <div className="p-2.5 bg-emerald-100 text-emerald-600 rounded-lg"><Flag size={20} /></div>
                              <div>
                                <h4 className="font-bold text-slate-900 text-base mb-0.5">{holiday.name}</h4>
                                <span className="inline-block px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded text-[10px] font-bold border border-emerald-100 uppercase tracking-wider">Feriado {holiday.type}</span>
                              </div>
                           </div>
                         ))}
                       </div>
                     </div>
                   )}

                   {dayEvents.length > 0 && (
                     <div className="bg-indigo-50/50 p-4 md:p-6 rounded-xl border border-indigo-100">
                       <h4 className="text-sm font-bold text-indigo-800 uppercase tracking-wider mb-4 flex items-center gap-2"><Briefcase size={18} /> Lançamentos Internos</h4>
                       <div className="flex flex-col gap-4">
                         {dayEvents.map(event => <EventCard key={event.id} event={event} /> )}
                       </div>
                     </div>
                   )}

                   {dayBillings.length > 0 && (
                     <div className="bg-amber-50/50 p-4 md:p-6 rounded-xl border border-amber-100">
                       <h4 className="text-sm font-bold text-amber-800 uppercase tracking-wider mb-4 flex items-center gap-2"><DollarSign size={18} /> Observações de Faturamento</h4>
                       <div className="flex flex-col gap-4">
                         {dayBillings.map(billing => <EventCard key={billing.id} event={billing} /> )}
                       </div>
                     </div>
                   )}
                 </div>
               );
            })()}
          </Modal>

          {/* Modal Mês Estendido */}
          <Modal isOpen={isMonthModalOpen} onClose={() => setIsMonthModalOpen(false)} title={`Visão Mensal: ${new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(viewDate)}`} icon={CalendarIcon} colorClass="bg-blue-600">
            <div className="w-full bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="grid grid-cols-7 bg-slate-50 border-b border-slate-200">
                {['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].map(day => (
                  <div key={day} className="text-center text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider py-3 border-r border-slate-200 last:border-r-0">{day}</div>
                ))}
              </div>
              <div className="flex flex-col">
                {monthWeeks.map((week, wIdx) => (
                  <div key={wIdx} className="grid grid-cols-7 border-b border-slate-100 last:border-b-0">
                    {week.map((day, dIdx) => {
                      if (!day) return <div key={`empty-${wIdx}-${dIdx}`} className="min-h-[80px] md:min-h-[100px] border-r border-slate-100 last:border-r-0 bg-slate-50/50"></div>;
                      const isActualToday = isSameDay(day, todayDate);
                      const dayEvents = hrEvents.filter(e => isSameDay(new Date(e.date + 'T12:00:00'), day) && e.type !== 'Faturamento');
                      const dayHolidays = dbHolidays.filter(h => isSameDay(new Date(h.date + 'T12:00:00'), day));
                      const dayBillings = hrEvents.filter(b => isSameDay(new Date(b.date + 'T12:00:00'), day) && b.type === 'Faturamento');

                      return (
                        <div key={dIdx} onClick={() => { setIsMonthModalOpen(false); openDayDetails(day); }} className={`min-h-[80px] md:min-h-[100px] p-1.5 md:p-2 border-r border-slate-100 last:border-r-0 flex flex-col transition-all cursor-pointer relative group ${isActualToday ? 'bg-blue-50/30' : 'hover:bg-slate-50'}`}>
                          <div className="flex justify-between items-start mb-1">
                            <div className={`w-6 h-6 md:w-7 md:h-7 flex items-center justify-center rounded-full text-xs md:text-sm font-bold ${isActualToday ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-700 group-hover:bg-blue-100 group-hover:text-blue-700'}`}>{day.getDate()}</div>
                            <div className="flex gap-0.5 md:hidden">
                              {dayEvents.length > 0 && <span className="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>}
                              {dayHolidays.length > 0 && <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>}
                              {dayBillings.length > 0 && <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>}
                            </div>
                          </div>
                          <div className="hidden md:flex flex-col gap-1 w-full overflow-hidden flex-1">
                            {dayHolidays.length > 0 && dayHolidays.slice(0, 1).map((h, i) => (<div key={`h-${i}`} className="text-[9px] font-bold px-1 py-0.5 bg-emerald-50 text-emerald-700 rounded border border-emerald-100 truncate w-full" title={h.name}>{h.name}</div>))}
                            {dayEvents.length > 0 && dayEvents.slice(0, 1).map((e, i) => (<div key={`e-${i}`} className="text-[9px] font-bold px-1 py-0.5 bg-indigo-50 text-indigo-700 rounded border border-indigo-100 truncate w-full" title={e.title}>{e.type}</div>))}
                            {dayBillings.length > 0 && dayBillings.slice(0, 1).map((b, i) => (<div key={`b-${i}`} className="text-[9px] font-bold px-1 py-0.5 bg-amber-50 text-amber-700 rounded border border-amber-100 truncate w-full" title="Faturamento">Fat: {b.billing_value}</div>))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </Modal>

          {/* ================= MODAL DE AUTENTICAÇÃO (LOGIN/REGISTO) ================= */}
          <Modal isOpen={isAuthModalOpen} onClose={() => setIsAuthModalOpen(false)} title={isSignUp ? "Criar Conta" : "Área Restrita (Login)"} icon={Lock} colorClass="bg-slate-800">
            <div className="max-w-md mx-auto bg-white p-6 md:p-8 rounded-xl border border-slate-200 shadow-sm">
              <form onSubmit={handleAuth} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">E-mail Corporativo</label>
                  <input type="email" required value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-lg outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="seu.email@empresa.com"/>
                </div>
                <div>
                  <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Senha</label>
                  <input type="password" required value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="w-full bg-slate-50 border border-slate-200 p-3 rounded-lg outline-none focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••"/>
                </div>
                <button type="submit" disabled={authLoading} className="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-900 transition-colors disabled:opacity-50 mt-4">
                  {authLoading ? 'A processar...' : (isSignUp ? 'Criar Conta' : 'Entrar')}
                </button>
              </form>
              <div className="mt-6 text-center">
                <button onClick={() => setIsSignUp(!isSignUp)} className="text-sm font-semibold text-blue-600 hover:text-blue-800">
                  {isSignUp ? 'Já tem conta? Fazer Login' : 'Primeiro acesso? Registar conta'}
                </button>
              </div>
            </div>
          </Modal>

          {/* ================= MODAL PAINEL ADMIN (INSERÇÃO NO SUPABASE) ================= */}
          <Modal isOpen={isAdminModalOpen} onClose={() => setIsAdminModalOpen(false)} title="Gestão de Calendário" icon={Briefcase} colorClass="bg-indigo-600">
            {!adminSelectedDate ? (
              <div className="space-y-6">
                <p className="text-sm text-slate-500 font-medium mb-6">Selecione o dia desejado nos blocos abaixo para adicionar um novo registro.</p>
                {allYearMonths.map((month, mIdx) => (
                  <div key={mIdx} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-slate-50 border-b border-slate-200 px-4 py-3">
                      <h4 className="font-bold text-slate-800 capitalize text-sm md:text-base flex items-center gap-2"><CalendarIcon size={16} className="text-indigo-500" /> {month.name}</h4>
                    </div>
                    <div className="flex overflow-x-auto hide-scrollbar p-3 gap-2">
                      {month.days.map((day, dIdx) => {
                        const dayName = new Intl.DateTimeFormat('pt-BR', { weekday: 'short' }).format(day).replace('.', '');
                        const hasEvent = hrEvents.some(e => isSameDay(new Date(e.date + 'T12:00:00'), day));
                        return (
                          <button key={dIdx} onClick={() => setAdminSelectedDate(day)} className={`flex-shrink-0 flex flex-col items-center justify-center p-3 w-16 rounded-lg border transition-all ${hasEvent ? 'border-indigo-200 bg-indigo-50 text-indigo-700' : 'border-slate-200 hover:border-indigo-400 hover:bg-slate-50 text-slate-600'}`}>
                            <span className="text-[10px] font-bold uppercase tracking-wider mb-1 opacity-70">{dayName}</span>
                            <span className="text-lg font-black">{day.getDate()}</span>
                            {hasEvent && <span className="w-1 h-1 bg-indigo-500 rounded-full mt-1"></span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="bg-white p-4 md:p-6 rounded-xl border border-slate-200 shadow-sm">
                <div className="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                  <h4 className="font-bold text-base md:text-lg text-slate-800">
                    Registro para {adminSelectedDate.getDate()} de {new Intl.DateTimeFormat('pt-BR', { month: 'long' }).format(adminSelectedDate)}
                  </h4>
                  <button onClick={() => setAdminSelectedDate(null)} className="text-xs md:text-sm font-semibold text-blue-600 hover:text-blue-800">← Voltar aos meses</button>
                </div>

                <form onSubmit={handleFormSubmit} className="space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tipo de Registro</label>
                      <select value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none font-medium">
                        <option value="Evento">Evento</option>
                        <option value="Informe">Informe</option>
                        <option value="Alteração de Folga">Alteração de Folga</option>
                        <option value="Troca de Feriado">Troca de Feriado</option>
                        <option value="Faturamento">Faturamento (Apenas Visual)</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Setor</label>
                      <select value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none font-medium">
                        {SECTORS.map(sec => <option key={sec} value={sec}>{sec}</option>)}
                      </select>
                    </div>

                    <div className="md:col-span-2">
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Título / Assunto</label>
                      <input type="text" required placeholder="Ex: Treinamento de Integração" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none font-medium" />
                    </div>

                    {formData.type === 'Evento' && (
                      <>
                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Hora de Início</label><input type="time" required value={formData.startTime} onChange={(e) => setFormData({...formData, startTime: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Hora de Fim</label><input type="time" required value={formData.endTime} onChange={(e) => setFormData({...formData, endTime: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Público-Alvo (Cargos)</label><input type="text" placeholder="Ex: Gestores de TI" value={formData.targetRoles} onChange={(e) => setFormData({...formData, targetRoles: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Local do Evento</label><input type="text" placeholder="Ex: Sala de Reuniões 1" value={formData.location} onChange={(e) => setFormData({...formData, location: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                      </>
                    )}

                    {formData.type === 'Informe' && (
                      <>
                        <div className="md:col-span-2">
                          <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Classificação do Informe</label>
                          <div className="flex flex-wrap gap-4 bg-slate-50 p-3 rounded-lg border border-slate-200">
                            {['Geral', 'Urgente', 'Específico'].map(cls => (
                              <label key={cls} className="flex items-center gap-2 cursor-pointer text-sm font-medium text-slate-700">
                                <input type="radio" name="classification" value={cls} checked={formData.classification === cls} onChange={(e) => setFormData({...formData, classification: e.target.value})} className="w-4 h-4 text-blue-600" />{cls}
                              </label>
                            ))}
                          </div>
                        </div>
                        <div className="md:col-span-2 flex items-center gap-2 mt-2 mb-1">
                          <input type="checkbox" id="hasPeriod" checked={formData.hasPeriod} onChange={(e) => setFormData({...formData, hasPeriod: e.target.checked})} className="w-4 h-4 text-blue-600 rounded border-slate-300" />
                          <label htmlFor="hasPeriod" className="text-sm font-bold text-slate-700 cursor-pointer">Este informe tem um período específico de duração?</label>
                        </div>
                        {formData.hasPeriod && (
                          <>
                            <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Hora de Início</label><input type="time" required value={formData.startTime} onChange={(e) => setFormData({...formData, startTime: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                            <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Hora de Fim</label><input type="time" required value={formData.endTime} onChange={(e) => setFormData({...formData, endTime: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                          </>
                        )}
                      </>
                    )}

                    {(formData.type === 'Alteração de Folga' || formData.type === 'Troca de Feriado') && (
                      <>
                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Data Original</label><input type="date" required value={formData.originalDate} onChange={(e) => setFormData({...formData, originalDate: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nova Data</label><input type="date" required value={formData.newDate} onChange={(e) => setFormData({...formData, newDate: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg p-2.5 outline-none" /></div>
                      </>
                    )}

                    <div className="md:col-span-2 mt-2">
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Descrição / Observações</label>
                      <textarea rows="3" placeholder="Detalhes adicionais..." value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none font-medium resize-none"></textarea>
                    </div>

                    <div className="md:col-span-2">
                       <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Anexos (PDF, Imagem, etc)</label>
                       <div className="flex items-center gap-3">
                         <label className="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-bold rounded-lg cursor-pointer transition-colors border border-slate-200">
                           <Paperclip size={16} /> Selecionar Arquivo
                           <input type="file" className="hidden" onChange={(e) => setFormData({...formData, file: e.target.files[0]})} />
                         </label>
                         <span className="text-sm font-medium text-slate-400">
                           {formData.file ? `Arquivo selecionado: ${formData.file.name}` : 'Nenhum arquivo selecionado.'}
                         </span>
                       </div>
                    </div>

                  </div>

                  <div className="pt-4 flex justify-end gap-3 border-t border-slate-100 mt-6">
                    <button type="button" onClick={() => setAdminSelectedDate(null)} className="px-5 py-2.5 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">
                      Cancelar
                    </button>
                    <button type="submit" disabled={isSubmitting} className="px-5 py-2.5 rounded-lg text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-colors flex items-center gap-2 disabled:opacity-50">
                      {isSubmitting ? 'A processar...' : <><PlusCircle size={16} /> Salvar Registro no Supabase</>}
                    </button>
                  </div>
                </form>

              </div>
            )}
          </Modal>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
